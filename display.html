<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FESTIVAL ASIK ASIA 2026 - Layar Kehadiran</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #ffd23f;
    --gold-soft: #ffe98a;
    --navy-1: #05060f;
    --navy-2: #0b1130;
    --navy-3: #131c44;
    --accent: #3ea6ff;
    --green: #29d17a;
  }

  html, body {
    height: 100%;
    background: var(--navy-1);
    overflow: hidden; /* halaman kiosk: tidak ada scroll manual sama sekali */
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    position: relative;
    background:
      radial-gradient(circle at 15% 10%, rgba(62,166,255,0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(255,210,63,0.14), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(41,209,122,0.10), transparent 45%),
      linear-gradient(180deg, var(--navy-1) 0%, var(--navy-2) 55%, var(--navy-1) 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 46px 46px;
    pointer-events: none;
    z-index: 0;
  }

  /* orb cahaya yang bergerak pelan di background, biar lebih hidup */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
  }
  .glow-orb.o1 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(255,210,63,0.35), transparent 70%);
    top: -80px; left: -60px;
    animation: floatA 16s ease-in-out infinite;
  }
  .glow-orb.o2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(62,166,255,0.30), transparent 70%);
    bottom: -100px; right: -80px;
    animation: floatB 20s ease-in-out infinite;
  }
  .glow-orb.o3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(41,209,122,0.25), transparent 70%);
    bottom: 10%; left: 40%;
    animation: floatC 24s ease-in-out infinite;
  }
  @keyframes floatA {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(60px, 40px); }
  }
  @keyframes floatB {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(-50px, -35px); }
  }
  @keyframes floatC {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-30px, 20px) scale(1.08); }
  }

  /* ===== LAYOUT UTAMA: mengisi 100vh, tidak pernah terpotong ===== */
  .wrap {
    position: relative;
    z-index: 1;
    height: 100vh;
    padding: 1.6vh 2.5vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 1vh;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2vw;
    flex: 0 0 auto;
  }

  .logo-box {
    display: flex;
    align-items: center;
    height: clamp(40px, 7vh, 84px);
    flex: 0 0 auto;
  }
  .logo-box img {
    height: 100%;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 14px rgba(255,255,255,0.15));
  }

  .clock-box {
    text-align: center;
    padding: 0.8vh 2vw;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(6px);
    min-width: 160px;
    flex: 0 0 auto;
  }
  #clockTime {
    font-size: clamp(18px, 2.4vh, 30px);
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(255,210,63,0.45);
    font-variant-numeric: tabular-nums;
  }
  #clockDate {
    font-size: clamp(9px, 1.1vh, 12px);
    color: #b9c2e0;
    letter-spacing: 1px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* ===== HEADLINE ===== */
  .headline-wrap {
    text-align: center;
    flex: 0 0 auto;
  }
  h1.headline {
    font-size: clamp(32px, 6.2vh, 70px);
    font-weight: 900;
    letter-spacing: 1.5px;
    line-height: 1.1;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold) 25%, #ffb200 50%, var(--gold) 75%, var(--gold-soft));
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(255,178,0,0.35);
    text-transform: uppercase;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: -250% center; }
  }
  p.subheadline {
    margin-top: 0.6vh;
    font-size: clamp(24px, 4.4vh, 50px);
    font-weight: 900;
    line-height: 1.1;
    color: #eaf1ff;
    letter-spacing: 0.5px;
    text-shadow: 0 0 24px rgba(62,166,255,0.30);
  }
  p.subheadline .dot { color: var(--accent); margin: 0 14px; }
  p.eventdate {
    margin-top: 0.6vh;
    font-size: clamp(12px, 1.6vh, 17px);
    font-weight: 800;
    color: var(--gold-soft);
    letter-spacing: 2px;
  }
  .divider {
    width: 120px;
    height: 3px;
    margin: 1vh auto 0;
    border-radius: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    background-size: 200% auto;
    animation: shimmer 3s linear infinite;
  }

  /* ===== WELCOME BOX — sesuai referensi: kotak navy rounded, font tegak & tebal ===== */
  #lastBox {
    position: relative;
    flex: 0 0 auto;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 2.2vh 3vw;
    border-radius: 20px;
    text-align: center;
    background: linear-gradient(160deg, rgba(30,45,110,0.55), rgba(8,12,32,0.75));
    border: 1.5px solid rgba(120,170,255,0.45);
    backdrop-filter: blur(8px);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    animation: breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { box-shadow: 0 0 35px rgba(120,170,255,0.18), inset 0 0 25px rgba(120,170,255,0.05); }
    50%     { box-shadow: 0 0 55px rgba(120,170,255,0.32), inset 0 0 35px rgba(120,170,255,0.10); }
  }
  #lastBox.pulse {
    transform: scale(1.02);
    box-shadow: 0 0 80px rgba(120,170,255,0.45), inset 0 0 45px rgba(120,170,255,0.14) !important;
  }
  #lastLabel {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    font-size: clamp(13px, 1.8vh, 19px);
    letter-spacing: 3px;
    color: #fff;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1.2vh;
  }
  #lastName {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    font-size: clamp(28px, 5.2vh, 58px);
    font-weight: 800;
    font-style: normal;
    line-height: 1.2;
    letter-spacing: 1px;
    word-break: break-word;
    color: #ffffff;
    text-transform: uppercase;
    text-shadow: 0 0 24px rgba(150,190,255,0.55), 0 2px 6px rgba(0,0,0,0.4);
    animation: nameIn 0.5s ease;
  }
  @keyframes nameIn {
    0%   { opacity: 0; transform: translateY(8px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== LIST PESERTA — kartu pil biru bernomor, sesuai referensi ===== */
  #listWrap {
    flex: 0 0 auto;
    height: clamp(180px, 30vh, 330px);
    max-width: 1150px;
    width: 100%;
    margin: 0 auto;
    padding: 1.4vh 1.8vw 0.8vh;
    border-radius: 16px;
    background: rgba(20,30,70,0.28);
    border: 1px solid rgba(120,170,255,0.22);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
  }
  #listTitle {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    font-size: clamp(11px, 1.4vh, 14px);
    color: #dfe8ff;
    letter-spacing: 2px;
    margin-bottom: 1vh;
    text-transform: uppercase;
    text-align: center;
    flex: 0 0 auto;
    font-weight: 600;
  }
  #listScroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: scroll;
    scrollbar-width: none;      /* Firefox: sembunyikan scrollbar */
    -ms-overflow-style: none;   /* IE/Edge lama */
  }
  #listScroll::-webkit-scrollbar { display: none; } /* Chrome/Safari: sembunyikan scrollbar */

  #list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8vh 10px;
    justify-content: center;
    align-content: flex-start;
    padding-bottom: 0.6vh;
  }
  .chip {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, rgba(90,140,255,0.22), rgba(20,30,80,0.55));
    border: 1px solid rgba(120,170,255,0.45);
    padding: 0.7vh 18px;
    border-radius: 24px;
    font-size: clamp(12px, 1.6vh, 15px);
    font-weight: 700;
    font-style: normal;
    color: #ffffff;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-transform: uppercase;
    animation: cardIn 0.45s ease;
  }
  .chip .num {
    color: var(--gold);
    font-weight: 800;
    margin-right: 4px;
  }
  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(6px) scale(0.94); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== COUNTER ===== */
  #counterWrap {
    text-align: center;
    flex: 0 0 auto;
  }
  #counter {
    display: inline-block;
    font-size: clamp(16px, 2.4vh, 25px);
    font-weight: 800;
    padding: 1vh 3vw;
    border-radius: 40px;
    color: var(--navy-1);
    background: linear-gradient(90deg, var(--gold-soft), var(--gold));
    box-shadow: 0 0 30px rgba(255,210,63,0.45);
    letter-spacing: 0.5px;
  }
  #status { font-size: 11px; color: #5a638a; margin-top: 6px; }
</style>
</head>

      <div id="list"></div>
    </div>
  </div>

  <div id="counterWrap">
    <div id="counter">Peserta sudah datang : 0</div>
    <div id="status"></div>
  </div>

</div>

<script>
  // =========================================================
  // GANTI dengan URL Web App Apps Script kamu (setelah deploy)
  // =========================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyD3Rs3MxcRWMfl4HKaIWtaHc2ZvqejhAAYpS8r8Ik4ZalvKHBrLcIUSFN7dGC-MAKOA/exec';

  let lastKnownCount = -1;

  function refresh() {
    fetch(APPS_SCRIPT_URL + '?action=getdata')
      .then(function (r) { return r.json(); })
      .then(render)
      .catch(function (err) {
        document.getElementById('status').innerText = 'Gagal ambil data: ' + err;
      });
  }

  function render(data) {
    document.getElementById('status').innerText = '';
    if (data.hadir !== lastKnownCount) {
      if (data.list.length > 0) {
        document.getElementById('lastName').innerText = data.list[0].nama;
        const box = document.getElementById('lastBox');
        box.classList.add('pulse');
        setTimeout(function () { box.classList.remove('pulse'); }, 400);
      }

      const listEl = document.getElementById('list');
      listEl.innerHTML = '';
      // data.list terurut dari yang paling baru check-in.
      // Dibalik supaya urut sesuai kedatangan (#1, #2, ... ) seperti di layar referensi.
      const urutKedatangan = data.list.slice().reverse();
      urutKedatangan.forEach(function (p, idx) {
        const span = document.createElement('span');
        span.className = 'chip';
        span.innerHTML = '<span class="num">#' + (idx + 1) + '</span>' + p.nama;
        listEl.appendChild(span);
      });

      document.getElementById('counter').innerText =
        'Peserta sudah datang : ' + data.hadir + ' / ' + data.total;

      lastKnownCount = data.hadir;
    }
  }

  refresh();
  setInterval(refresh, 3000);

  // ===== Jam digital real-time =====
  const hariList = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const bulanList = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').innerText = hh + ':' + mm + ':' + ss;
    document.getElementById('clockDate').innerText =
      hariList[now.getDay()] + ', ' + now.getDate() + ' ' + bulanList[now.getMonth()] + ' ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ===== Auto-scroll daftar peserta (naik terus dari atas ke bawah, lalu kembali ke atas) =====
  const scrollEl = document.getElementById('listScroll');
  let pauseUntil = 0;
  const SCROLL_SPEED = 0.6;   // px per tick — makin besar makin cepat
  const PAUSE_MS = 1400;      // jeda di atas & bawah sebelum lanjut/loop

  function autoScrollTick() {
    const now = Date.now();
    if (now < pauseUntil) return;

    const maxScroll = scrollEl.scrollHeight - scrollEl.clientHeight;
    if (maxScroll <= 2) return; // konten belum melebihi area, tidak perlu scroll

    if (scrollEl.scrollTop >= maxScroll - 1) {
      // sudah sampai bawah -> jeda, lalu loop ke atas
      pauseUntil = now + PAUSE_MS;
      setTimeout(function () {
        scrollEl.scrollTop = 0;
        pauseUntil = Date.now() + PAUSE_MS;
      }, PAUSE_MS);
    } else {
      scrollEl.scrollTop += SCROLL_SPEED;
    }
  }
  setInterval(autoScrollTick, 30);
</script>
</body>
</html>
